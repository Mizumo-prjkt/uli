name: Debian/Ubuntu Packaging

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-deb:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential cmake pkg-config \
          qt6-base-dev qt6-network-dev qt6-widgets-dev \
          libyaml-cpp-dev libarchive-dev libdbus-1-dev libisoburn-dev

    - name: Build All Components
      run: |
        chmod +x build.sh
        ./build.sh --all

    - name: Create Deb Package
      run: |
        VERSION=$(cat VERSION)
        if [[ "${{ github.ref_type }}" == "tag" ]]; then
          VERSION="${{ github.ref_name }}"
          VERSION=${VERSION#v}
        fi
        
        PKG_DIR="uli_${VERSION}_amd64"
        mkdir -p "${PKG_DIR}/usr/bin"
        mkdir -p "${PKG_DIR}/DEBIAN"
        
        cp build/uli_installer "${PKG_DIR}/usr/bin/"
        cp build/uli_patcher "${PKG_DIR}/usr/bin/"
        cp build/compositor/uli_compositor "${PKG_DIR}/usr/bin/"
        
        cat <<EOF > "${PKG_DIR}/DEBIAN/control"
        Package: uli
        Version: ${VERSION}
        Section: utils
        Priority: optional
        Architecture: amd64
        Depends: libc6, libgcc-s1, libstdc++6, qt6-base, libarchive13, libdbus-1-3, libisoburn1, libyaml-cpp0.8
        Maintainer: ${{ secrets.AUTHOR_NAME }} <${{ secrets.AUTHOR_EMAIL }}>
        Description: Universal Linux Installer
         A tool to allow unified installation of Linux distributions.
         Co-developed with Antigravity AI.
        EOF
        
        dpkg-deb --build "${PKG_DIR}"
        mv "${PKG_DIR}.deb" uli_latest_amd64.deb

    - name: Upload Deb Asset
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/v')
      with:
        files: uli_latest_amd64.deb
        append_body: true

    - name: Upload Artifact (Actions)
      uses: actions/upload-artifact@v4
      with:
        name: uli-debian-package
        path: uli_latest_amd64.deb
