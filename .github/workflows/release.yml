name: ULI Release Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          pkg-config \
          qt6-base-dev \
          qt6-base-private-dev \
          libyaml-cpp-dev \
          libarchive-dev \
          libdbus-1-dev \
          libisoburn-dev

    - name: Build All Components (Release)
      run: |
        chmod +x build.sh
        ./build.sh --all

    - name: Build All Components (Debug Stuff)
      run: |
        ./build.sh --debug --all
        mkdir -p debug_binaries
        cp build/uli_installer debug_binaries/debug_uli_installer
        cp build/uli_patcher debug_binaries/debug_uli_patcher
        cp build/compositor/uli_compositor debug_binaries/debug_uli_compositor

    - name: Prepare Artifacts
      run: |
        mkdir -p release_assets
        # Release binaries
        ./build.sh --all
        cp build/uli_installer release_assets/
        cp build/uli_patcher release_assets/
        cp build/compositor/uli_compositor release_assets/
        # Debug binaries
        cp debug_binaries/* release_assets/
        # Include a copy of VERSION and LICENSE if available
        cp VERSION release_assets/ || true
        # Create a compressed tarball
        tar -czvf uli-binaries-linux-x64.tar.gz -C release_assets .

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/v')
      with:
        files: |
          uli-binaries-linux-x64.tar.gz
          release_assets/*
        body: |
          ULI Pre-release ${{ github.ref_name }}
          
          Automated build artifacts for Linux x86_64.
          Includes both Release and Debug variants.
        draft: false
        prerelease: true

    - name: Upload Artifacts (Actions)
      uses: actions/upload-artifact@v4
      with:
        name: uli-binaries-linux-x64
        path: release_assets/
