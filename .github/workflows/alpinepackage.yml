name: Alpine Linux Packaging

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    container:
      image: alpine:latest
      options: --user root

    steps:
    - name: Install Build Dependencies
      run: |
        apk update
        apk add \
          build-base \
          cmake \
          git \
          pkgconfig \
          qt6-qtbase-dev \
          qt6-qtnetwork-dev \
          qt6-qtwidgets-dev \
          yaml-cpp-dev \
          libarchive-dev \
          dbus-dev \
          libisoburn-dev \
          sudo

    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Create Alpine Package
      run: |
        VERSION=$(cat VERSION)
        if [[ "${{ github.ref_type }}" == "tag" ]]; then
          VERSION="${{ github.ref_name }}"
          VERSION=${VERSION#v}
        fi

        # Setup abuild
        adduser -D builder
        echo "builder ALL=(ALL) NOPASSWD:ALL" >> /etc/sudoers
        addgroup builder abuild
        mkdir -p /var/cache/distfiles
        chmod a+w /var/cache/distfiles
        
        # Prepare APKBUILD
        mkdir -p build-apk
        cat <<EOF > build-apk/APKBUILD
        # Maintainer: ${{ secrets.AUTHOR_NAME }} <${{ secrets.AUTHOR_EMAIL }}>
        pkgname=uli
        pkgver=${VERSION}
        pkgrel=0
        pkgdesc="Universal Linux Installer"
        url="https://github.com/\${github.repository}"
        arch="x86_64"
        license="MIT"
        depends="qt6-qtbase qt6-qtnetwork qt6-qtwidgets libarchive dbus libisoburn yaml-cpp"
        makedepends="cmake build-base pkgconfig"
        source=""
        
        build() {
          cmake -B build -S .. \
            -DULI_BUILD_ALL=ON \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build
        }

        package() {
          install -Dm755 build/uli_installer "\$pkgdir"/usr/bin/uli_installer
          install -Dm755 build/uli_patcher "\$pkgdir"/usr/bin/uli_patcher
          install -Dm755 build/compositor/uli_compositor "\$pkgdir"/usr/bin/uli_compositor
        }
        EOF

        chown -R builder:builder .
        # In a real scenario we'd need to sign it, but for CI artifacts we skip signing or use a dummy key
        sudo -u builder abuild-keygen -a -n
        sudo -u builder -d abuild -F -p build-apk/APKBUILD
        
        # Binary result is in ~/packages/build-apk/x86_64/
        mkdir -p output
        cp /home/builder/packages/build-apk/x86_64/*.apk output/

    - name: Upload APK Asset
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/v')
      with:
        files: output/*.apk
        append_body: true

    - name: Upload Artifact (Actions)
      uses: actions/upload-artifact@v4
      with:
        name: uli-alpine-package
        path: output/*.apk
        if-no-files-found: error
