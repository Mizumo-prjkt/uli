name: ULI Debug Build

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          pkg-config \
          qt6-base-dev \
          qt6-base-private-dev \
          qt6-network-dev \
          qt6-widgets-dev \
          libyaml-cpp-dev \
          libarchive-dev \
          libdbus-1-dev \
          libisoburn-dev

    - name: Build All Components (Debug)
      run: |
        chmod +x build.sh
        ./build.sh --debug --all

    - name: Verify Binaries
      run: |
        ./build/uli_installer --version
        ./build/uli_patcher --version
        ./build/compositor/uli_compositor --version
