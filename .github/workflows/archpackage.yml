name: Arch Linux AUR Packaging

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'AUR Target (uli or uli-git)'
        required: true
        default: 'uli-git'
        type: choice
        options:
        - uli
        - uli-git
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set Version
      id: vars
      run: |
        VERSION=$(cat VERSION)
        # Sanitize version for Arch (no hyphens allowed in pkgver)
        ARCH_VERSION=$(echo $VERSION | sed 's/-/./g')
        TARGET="${{ github.event.inputs.target || 'uli-git' }}"
        if [[ "${{ github.ref_type }}" == "tag" ]]; then
          TARGET="uli"
          VERSION="${{ github.ref_name }}"
          VERSION=${VERSION#v}
          ARCH_VERSION=$(echo $VERSION | sed 's/-/./g')
        fi
        echo "version=${VERSION}" >> $GITHUB_OUTPUT
        echo "arch_version=${ARCH_VERSION}" >> $GITHUB_OUTPUT
        echo "target=${TARGET}" >> $GITHUB_OUTPUT

    - name: Generate PKGBUILD
      run: |
        TARGET="${{ steps.vars.outputs.target }}"
        cat <<EOF > PKGBUILD
        # Maintainer: ${{ secrets.AUTHOR_NAME }} <${{ secrets.AUTHOR_EMAIL }}>
        pkgname=${TARGET}
        pkgver=${{ steps.vars.outputs.arch_version }}
        pkgrel=1
        pkgdesc="Universal Linux Installer co-developed with Antigravity"
        arch=('x86_64')
        url="https://github.com/${{ github.repository }}"
        license=('MIT')
        depends=('qt6-base' 'libarchive' 'dbus' 'libisoburn' 'yaml-cpp')
        EOF

        if [[ "${TARGET}" == "uli-git" ]]; then
          cat <<EOF >> PKGBUILD
        makedepends=('cmake' 'make' 'git')
        provides=("uli")
        conflicts=("uli")
        source=("git+https://github.com/${{ github.repository }}.git")
        sha256sums=('SKIP')

        pkgver() {
          cd "uli"
          git describe --long --tags | sed 's/^v//;s/\([^-]*-g\)/r\1/;s/-/./g'
        }

        build() {
          cmake -B build -S "uli" \\
            -DULI_BUILD_ALL=ON \\
            -DCMAKE_BUILD_TYPE=Release
          make -C build
        }
        EOF
        else
          cat <<EOF >> PKGBUILD
        makedepends=('cmake' 'make')
        source=("\${pkgname}-\${pkgver}.tar.gz::https://github.com/${{ github.repository }}/archive/refs/tags/v\${pkgver}.tar.gz")
        sha256sums=('SKIP')

        build() {
          cmake -B build -S "uli-\${pkgver}" \\
            -DULI_BUILD_ALL=ON \\
            -DCMAKE_BUILD_TYPE=Release
          make -C build
        }
        EOF
        fi

        cat <<EOF >> PKGBUILD
        package() {
          install -Dm755 build/uli_installer "\${pkgdir}/usr/bin/uli_installer"
          install -Dm755 build/uli_patcher "\${pkgdir}/usr/bin/uli_patcher"
          install -Dm755 build/compositor/uli_compositor "\${pkgdir}/usr/bin/uli_compositor"
        }
        EOF

    - name: Arch Build Check & .SRCINFO Generation
      run: |
        docker run --rm -v $(pwd):/workspace -w /workspace archlinux:latest bash -c "
          pacman -Syu --noconfirm base-devel
          useradd -m builder
          chown -R builder:builder .
          sudo -u builder makepkg --printsrcinfo > .SRCINFO
          # Restore ownership to the host user (UID 1001 is standard for GH Runners)
          chown -R 1001:1001 .
        "

    - name: Setup SSH for AUR
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.AUR_PRIVATE_OPENSSHKEY }}

    - name: Deploy to AUR
      run: |
        # Setup SSH known hosts
        mkdir -p ~/.ssh
        ssh-keyscan -t ed25519 aur.archlinux.org >> ~/.ssh/known_hosts
        
        TARGET="${{ steps.vars.outputs.target }}"
        
        # Clone (or initialize) the repo
        # A simple push creation logic
        git clone aur@aur.archlinux.org:${TARGET}.git aur_repo || (mkdir aur_repo && cd aur_repo && git init && git remote add origin aur@aur.archlinux.org:${TARGET}.git)
        
        cp PKGBUILD .SRCINFO aur_repo/
        cd aur_repo
        
        git config user.name "${{ secrets.AUR_USERNAME }}"
        git config user.email "${{ secrets.AUTHOR_EMAIL }}"
        
        git add PKGBUILD .SRCINFO
        if git diff --cached --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Update to ${{ steps.vars.outputs.version }}"
          git push origin master || git push origin main
        fi
